<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBAN Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .status {
            font-size: 0.85rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .welcome-message {            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }

        .welcome-message h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .welcome-message p {
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .suggestion-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            font-size: 0.9rem;
            color: #475569;
        }

        .suggestion-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        /* Chat Messages */
        .message {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar.user {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
        }

        .message.ai .message-content {
            background: white;
            border: 1px solid #e2e8f0;
            border-top-left-radius: 5px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;            border-top-right-radius: 5px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            gap: 15px;
            margin-bottom: 20px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: white;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;        }

        #userInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        #sendBtn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Footer */
        .chat-footer {
            text-align: center;
            padding: 10px;
            background: #f8fafc;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Scrollbar */        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }

            .header-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <h1>OBAN Chat</h1>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>OBAN 1.1 · Online</span>
                </div>
            </div>            <div class="header-right">
                <button class="header-btn" onclick="newChat()">💬 Chat Baru</button>
                <button class="header-btn" onclick="clearHistory()">🗑️ Hapus Riwayat</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-message" id="welcomeMessage">
                <h2>👋 Halo, ada yang bisa saya bantu?</h2>
                <p>Tanya apa saja — saya siap membantu kamu berpikir, menulis, belajar, dan berkreasi.</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendSuggestion('Jelaskan cara kerja black hole dengan bahasa yang mudah')">
                        🌌 Jelaskan cara kerja black hole dengan bahasa yang mudah
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Bantu saya tulis email profesional untuk melamar pekerjaan')">
                        📧 Bantu saya tulis email profesional untuk melamar pekerjaan
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Apa perbedaan machine learning dan deep learning?')">
                        🤖 Apa perbedaan machine learning dan deep learning?
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Buat rencana belajar coding 3 bulan untuk pemula')">
                        💻 Buat rencana belajar coding 3 bulan untuk pemula
                    </button>
                </div>
            </div>
            <div id="messages"></div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="avatar ai">AI</div>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ketik pesan Anda di sini..." autocomplete="off">
                <button id="sendBtn" onclick="sendMessage()">📤 Kirim</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="chat-footer">
            OBAN Chat · Powered by Groq        </div>
    </div>

    <script>
        // === KONFIGURASI API GROQ ===
        // ⚠️ Ganti dengan API Key Anda dari https://console.groq.com
        const GROQ_API_KEY = 'YOUR_GROQ_API_KEY_HERE';
        const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';

        // === ELEMENT DOM ===
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messages');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const typingIndicator = document.getElementById('typingIndicator');
        const chatArea = document.getElementById('chatArea');

        // === RIWAYAT CHAT ===
        let chatHistory = [];

        // === EVENT LISTENER ===
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // === FUNGSI KIRIM PESAN ===
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Sembunyikan welcome message
            welcomeMessage.style.display = 'none';

            // Tambahkan pesan pengguna
            addMessage(message, 'user');
            userInput.value = '';

            // Tampilkan indikator mengetik
            showTyping(true);
            sendBtn.disabled = true;

            try {
                // Tambahkan ke history
                chatHistory.push({ role: 'user', content: message });

                // Panggil API Groq
                const response = await fetch(GROQ_API_URL, {                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {
                                role: 'system',
                                content: 'Anda adalah OBAN 1.1, asisten AI yang membantu pengguna dalam berpikir, menulis, belajar, dan berkreasi. Jawab dengan bahasa Indonesia yang ramah dan mudah dipahami.'
                            },
                            ...chatHistory
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Tambahkan respons AI ke history
                chatHistory.push({ role: 'assistant', content: aiResponse });

                // Tampilkan respons AI
                addMessage(aiResponse, 'ai');

            } catch (error) {
                console.error('Error:', error);
                addMessage('Maaf, terjadi kesalahan saat memproses permintaan Anda. Pastikan API Key sudah diatur dengan benar.', 'ai');
            } finally {
                showTyping(false);
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // === FUNGSI TAMBAH PESAN KE CHAT ===
        function addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}`;
            avatar.textContent = sender === 'user' ? 'U' : 'AI';            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll ke bawah
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // === FUNGSI INDIKATOR MENGETIK ===
        function showTyping(show) {
            typingIndicator.classList.toggle('active', show);
            if (show) {
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // === FUNGSI KIRIM SARAN ===
        function sendSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        // === FUNGSI CHAT BARU ===
        function newChat() {
            chatHistory = [];
            messagesContainer.innerHTML = '';
            welcomeMessage.style.display = 'block';
            userInput.value = '';
            userInput.focus();
        }

        // === FUNGSI HAPUS RIWAYAT ===
        function clearHistory() {
            if (confirm('Apakah Anda yakin ingin menghapus semua riwayat chat?')) {
                newChat();
            }
        }

        // === FOCUS INPUT SAAT LOAD ===
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
