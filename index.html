<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBAN AI TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00fff7;--bg:#050a0e;--panel:#08131a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--cyan);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column}
.header{font-family:Orbitron,monospace;text-align:center;padding:14px;border-bottom:1px solid rgba(0,255,247,.2);letter-spacing:5px}
.tabs{display:flex;border-bottom:1px solid rgba(0,255,247,.15)}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:rgba(0,255,247,.4)}
.tab.active{color:var(--cyan);background:rgba(0,255,247,.05)}
.panel{flex:1;display:none;overflow:auto}
.panel.active{display:flex;flex-direction:column}
.chat{flex:1;overflow:auto;padding:16px}
.msg{margin-bottom:14px;max-width:85%}
.msg.user{margin-left:auto;color:#ffc1d6;text-align:right}
.msg.ai{color:#9ffffa}
.input{display:flex;border-top:1px solid rgba(0,255,247,.2)}
textarea{flex:1;background:transparent;border:none;color:var(--cyan);padding:12px;font-family:inherit;outline:none;resize:none}
button{background:#002026;border:1px solid var(--cyan);color:var(--cyan);padding:10px 16px;cursor:pointer}
.setup{position:fixed;inset:0;background:#050a0e;display:flex;align-items:center;justify-content:center}
.box{border:1px solid var(--cyan);padding:26px;width:320px;background:#071017}
input{width:100%;background:#021418;border:none;border-bottom:2px solid var(--cyan);color:var(--cyan);padding:10px;margin-top:10px}
.error{color:#ff4c7a;font-size:12px;height:16px;margin-top:6px}
.ticker{display:flex;gap:16px;padding:6px 12px;border-bottom:1px solid rgba(0,255,247,.15);overflow:auto;font-size:12px}
.token{border-bottom:1px solid rgba(0,255,247,.1);padding:12px}
.token b{font-family:Orbitron}
.small{font-size:11px;color:rgba(0,255,247,.6)}
</style>
</head>
<body><div class="setup" id="setup">
<div class="box">
<div style="font-family:Orbitron">OBAN.AI TERMINAL</div>
<div class="small">Masukkan Groq API key</div>
<input id="keyInput" placeholder="gsk_xxxxxxxxx">
<div class="error" id="err"></div>
<button id="setupBtn">AKTIFKAN SISTEM</button>
</div>
</div><div class="header">OBAN TERMINAL</div><div class="ticker" id="ticker">Loading market...</div><div class="tabs">
<div class="tab active" data-tab="chat">CHAT AI</div>
<div class="tab" data-tab="trend">TRENDING TOKENS</div>
</div><div class="panel active" id="chatPanel">
<div class="chat" id="chat"></div>
<div class="input">
<textarea id="msg" rows="1" placeholder="Tanya apa saja..."></textarea>
<button id="send">Kirim</button>
</div>
</div><div class="panel" id="trendPanel">
<div id="trendList"></div>
</div><script>
let apiKey="";
let history=[];

const setup=document.getElementById("setup");
const keyInput=document.getElementById("keyInput");
const err=document.getElementById("err");
const setupBtn=document.getElementById("setupBtn");
const chat=document.getElementById("chat");
const msg=document.getElementById("msg");
const send=document.getElementById("send");

function safeGet(k){try{return localStorage.getItem(k)}catch{return null}}
function safeSet(k,v){try{localStorage.setItem(k,v)}catch{}}

function init(){
const k=safeGet("oban_key");
if(k){apiKey=k;setup.style.display="none"}
loadTicker();
loadTrending();
}

function doSetup(){
const k=keyInput.value.trim();
if(!k){err.textContent="API key kosong";return}
if(!k.startsWith("gsk_")){err.textContent="Harus diawali gsk_";return}
apiKey=k;
safeSet("oban_key",k);
setup.style.display="none";
}

function add(role,text){
const d=document.createElement("div");
d.className="msg "+role;
d.textContent=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

async function sendMsg(){
const text=msg.value.trim();
if(!text||!apiKey)return;
msg.value="";
add("user",text);
add("ai","...");

history.push({role:"user",content:text});

try{
const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{"Authorization":"Bearer "+apiKey,"Content-Type":"application/json"},
body:JSON.stringify({
model:"llama-3.3-70b-versatile",
messages:[{role:"system",content:"Kamu adalah OBAN AI, analis crypto dan asisten pintar."},...history],
max_tokens:800
})
});

const data=await r.json();
chat.lastChild.remove();

if(data.choices){
const reply=data.choices[0].message.content;
add("ai",reply);
history.push({role:"assistant",content:reply});
}else add("ai","AI error");

}catch(e){
chat.lastChild.remove();
add("ai","Connection error");
}
}

async function loadTicker(){
try{
const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true");
const d=await r.json();
const t=document.getElementById("ticker");

let html="";
for(const k in d){
const p=d[k].usd;
const c=d[k].usd_24h_change.toFixed(2);
html+=`${k.toUpperCase()} $${p} (${c}%)`;
}

t.innerHTML=html;
}catch{}
}

async function loadTrending(){
try{
const r=await fetch("https://api.dexscreener.com/token-boosts/top/v1");
const d=await r.json();
const list=document.getElementById("trendList");
list.innerHTML="";

const sol=d.filter(x=>x.chainId==="solana").slice(0,10);

sol.forEach(t=>{
const el=document.createElement("div");
el.className="token";
el.innerHTML=`<b>${t.tokenAddress.slice(0,6)}</b><div class='small'>boost ${t.totalAmount}</div>`;
list.appendChild(el);
});
}catch{}
}

setupBtn.addEventListener("click",doSetup);
keyInput.addEventListener("keydown",e=>{if(e.key==='Enter')doSetup()});
send.addEventListener("click",sendMsg);
msg.addEventListener("keydown",e=>{if(e.key==='Enter'){e.preventDefault();sendMsg()}});

// tab system
const tabs=document.querySelectorAll('.tab');
const chatPanel=document.getElementById('chatPanel');
const trendPanel=document.getElementById('trendPanel');

tabs.forEach(t=>{
t.onclick=()=>{
tabs.forEach(x=>x.classList.remove('active'));
t.classList.add('active');

if(t.dataset.tab==='chat'){
chatPanel.classList.add('active');
trendPanel.classList.remove('active');
}else{
trendPanel.classList.add('active');
chatPanel.classList.remove('active');
}
};
});

init();
</script></body>
</html>
