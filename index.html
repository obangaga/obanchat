<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBAN Chat Pro</title><style>
:root{
--bg:#0a0a0a;
--surface:#141414;
--border:#262626;
--text:#e8e8e8;
--muted:#777;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0f0f0f;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:14px;
border-bottom:1px solid var(--border);
}

.new-chat{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:var(--surface);
color:var(--text);
cursor:pointer;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:12px 14px;
border-bottom:1px solid #1a1a1a;
cursor:pointer;
font-size:13px;
color:var(--muted);
}

.chat-item:hover{
background:#1a1a1a;
color:white;
}

.chat-item.active{
background:#1a1a1a;
color:white;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:14px 20px;
border-bottom:1px solid var(--border);
font-weight:600;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
margin-bottom:16px;
max-width:700px;
}

.user{
color:#ddd;
}

.ai{
color:white;
}

/* INPUT */

.input-area{
border-top:1px solid var(--border);
padding:14px;
display:flex;
gap:10px;
}

textarea{
flex:1;
resize:none;
padding:12px;
background:var(--surface);
border:1px solid var(--border);
color:var(--text);
border-radius:8px;
height:44px;
}

button.send{
padding:10px 16px;
border:none;
background:white;
color:black;
border-radius:8px;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:#141414;
padding:24px;
border-radius:12px;
width:320px;
}

.modal-box input{
width:100%;
padding:10px;
margin:10px 0;
background:#000;
border:1px solid #333;
color:white;
}

</style></head><body><div class="sidebar"><div class="sidebar-header">
<button class="new-chat" onclick="createChat()">+ New Chat</button>
</div><div class="chat-list" id="chatList"></div></div><div class="main"><header>OBAN Chat · Groq AI</header><div class="messages" id="messages"></div><div class="input-area">
<textarea id="input"></textarea>
<button class="send" onclick="send()">Send</button>
</div></div><div class="modal" id="modal">
<div class="modal-box"><h3>Masukkan Groq API Key</h3><input id="apikey" placeholder="gsk_..."><button onclick="saveKey()">Mulai</button>

</div>
</div><script>

let apiKey = localStorage.getItem("oban_key")

let chats = JSON.parse(localStorage.getItem("oban_chats") || "[]")

let current = null

if(apiKey) document.getElementById("modal").style.display="none"


function saveKey(){

apiKey=document.getElementById("apikey").value

localStorage.setItem("oban_key",apiKey)

document.getElementById("modal").style.display="none"

}


function saveChats(){

localStorage.setItem("oban_chats",JSON.stringify(chats))

}


function renderChats(){

const list=document.getElementById("chatList")

list.innerHTML=""

chats.forEach(c=>{

const div=document.createElement("div")

div.className="chat-item"+(c.id===current?" active":"")

div.innerText=c.title

div.onclick=()=>{

current=c.id

loadChat()

renderChats()

}

list.appendChild(div)

})

}


function createChat(){

const id=Date.now()

const chat={

id,

title:"New Chat",

messages:[]

}

chats.unshift(chat)

current=id

saveChats()

renderChats()

loadChat()

}


function loadChat(){

const chat=chats.find(c=>c.id===current)

const box=document.getElementById("messages")

box.innerHTML=""

chat.messages.forEach(m=>{

const div=document.createElement("div")

div.className="msg "+m.role

div.innerText=m.text

box.appendChild(div)

})

}


async function send(){

const input=document.getElementById("input")

const text=input.value.trim()

if(!text)return

input.value=""

const chat=chats.find(c=>c.id===current)

chat.messages.push({role:"user",text})

renderMsg("user",text)

saveChats()

const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},

body:JSON.stringify({

model:"llama-3.3-70b-versatile",

messages:[

{role:"system",content:"You are OBAN AI assistant."},

...chat.messages.map(m=>({role:m.role=="user"?"user":"assistant",content:m.text}))

]

})

})

const data=await res.json()

const reply=data.choices[0].message.content

chat.messages.push({role:"ai",text:reply})

renderMsg("ai",reply)

saveChats()

}


function renderMsg(role,text){

const box=document.getElementById("messages")

const div=document.createElement("div")

div.className="msg "+role

div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}


if(chats.length){

current=chats[0].id

renderChats()

loadChat()

}else{

createChat()

}

</script></body>
</html>
