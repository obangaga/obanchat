<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBAN TERMINAL PRO</title>
<style>
body{
background:#030b0f;
color:#00f7ff;
font-family:monospace;
margin:0;
padding:0;
}
header{
text-align:center;
padding:20px;
font-size:22px;
letter-spacing:4px;
border-bottom:1px solid #03343a;
}
#ticker{
padding:10px;
border-bottom:1px solid #03343a;
font-size:14px;
}
.tabs{
display:flex;
}
.tab{
flex:1;
padding:12px;
text-align:center;
cursor:pointer;
border-bottom:1px solid #03343a;
}
.tab.active{
background:#02262b;
}
.section{
display:none;
padding:10px;
}
.section.active{
display:block;
}
.token{
border-bottom:1px solid #02262b;
padding:10px;
display:flex;
justify-content:space-between;
}
.token span{
font-size:13px;
}
input,button{
background:#01191d;
border:1px solid #00f7ff;
color:#00f7ff;
padding:8px;
margin:5px 0;
width:100%;
}
#chatBox{
height:300px;
overflow:auto;
border:1px solid #02262b;
padding:10px;
margin-bottom:10px;
}
</style>
</head>
<body><header>OBAN TERMINAL PRO</header><div id="ticker">Loading market...</div><div class="tabs">
<div class="tab active" onclick="openTab('ai')">AI CHAT</div>
<div class="tab" onclick="openTab('tokens')">TRENDING TOKENS</div>
</div><div id="ai" class="section active">
<input id="apiKey" placeholder="Enter Groq API Key">
<button onclick="saveKey()">Initialize System</button><div id="chatBox"></div>
<input id="prompt" placeholder="Ask AI about crypto...">
<button onclick="sendAI()">Send</button>
</div><div id="tokens" class="section">
<div id="tokenList">Loading tokens...</div>
</div><script>
let apiKey="";

function openTab(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

document.getElementById(id).classList.add('active');
event.target.classList.add('active');
}

function saveKey(){
apiKey=document.getElementById('apiKey').value;
localStorage.setItem('groq_key',apiKey);
alert('System Initialized');
}

async function loadTicker(){
try{
let r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd');
let d=await r.json();

document.getElementById('ticker').innerText=
`BTC $${d.bitcoin.usd} | ETH $${d.ethereum.usd} | SOL $${d.solana.usd}`;
}catch(e){
console.log(e);
}
}

async function loadTokens(){
try{
let r=await fetch('https://api.dexscreener.com/latest/dex/pairs/solana');
let d=await r.json();

let html="";

let tokens=d.pairs.slice(0,20);

tokens.forEach(t=>{
html+=`
<div class="token">
<div>
<b>${t.baseToken.name}</b><br>
<span>${t.baseToken.symbol}</span>
</div>
<div>
<span>$${Number(t.priceUsd).toFixed(6)}</span><br>
<span>Vol ${Math.round(t.volume.h24)}</span>
</div>
</div>`;
});

document.getElementById('tokenList').innerHTML=html;

}catch(e){
console.log(e);
}
}

async function sendAI(){
let prompt=document.getElementById('prompt').value;
let box=document.getElementById('chatBox');

box.innerHTML+=`<div>> ${prompt}</div>`;

try{
let r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':'Bearer '+apiKey
},
body:JSON.stringify({
model:'llama3-70b-8192',
messages:[{role:'user',content:prompt}]
})
});

let d=await r.json();

let reply=d.choices[0].message.content;

box.innerHTML+=`<div>${reply}</div>`;
box.scrollTop=box.scrollHeight;

}catch(e){
box.innerHTML+=`<div>AI error</div>`;
}
}

loadTicker();
loadTokens();
setInterval(loadTicker,20000);
</script></body>
</html>
